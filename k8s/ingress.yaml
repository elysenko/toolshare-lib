apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: toolshare-lib-staging
  namespace: colossus-toolshare-lib-staging
  labels:
    app: toolshare-lib-staging
    managed-by: colossus
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: ubuntu.desmana-truck.ts.net
      http:
        paths:
          - path: /toolshare-lib-staging(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: toolshare-lib-staging
                port:
                  number: 80
  tls:
    - hosts:
        - ubuntu.desmana-truck.ts.net
      secretName: colossus-shared-tls
