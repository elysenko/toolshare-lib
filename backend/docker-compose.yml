version: '3.8'

services:
  nest-prisma-auth:
    image: postgres:16-alpine
    container_name: nest-prisma-auth-postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres:/var/lib/postgres/data

  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - nest-prisma-auth
    env_file:
      - .env
    restart: unless-stopped
