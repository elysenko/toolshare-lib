# colossus.yaml — generated by scaffolder, read by deploy agents.
# Do not delete. The deploy agents use this instead of framework auto-detection.
# {{IMAGE_NAME}} is a placeholder substituted by the deploy agent at build time.
#
# Topology: Angular SPA (web/frontend, nginx) + a single NestJS + Prisma API
# (the project-root `backend/`, which holds the full ToolShare domain:
# auth, tools, loans, reservations, dashboard). The frontend's nginx proxies
# `/api/` to the backend Service, which MUST be named `backend` so that
# `web/nginx.conf` (`proxy_pass http://backend:3000/api/`) resolves.
#
# The scaffold also generated a second, domain-less NestJS stub under
# `web/backend/`; it is intentionally NOT deployed — the frontend talks only to
# the full-domain `backend/` below.

framework: angular
projectName: frontend
outputDir: web/frontend/dist/frontend/browser
baseHref: "/{{IMAGE_NAME}}/"
port: 80
nginx: spa-fallback
dockerfile: web/Dockerfile.frontend
backend:
  name: backend
  buildDir: backend
  port: 3000
  dockerfile: Dockerfile
