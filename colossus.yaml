# colossus.yaml — generated by scaffolder, read by deploy agents.
# Do not delete. The deploy agents use this instead of framework auto-detection.
# {{IMAGE_NAME}} is a placeholder substituted by the deploy agent at build time.
#
# This project was scaffolded with two platforms: `backend` (standalone NestJS
# API, project root) and `web` (Angular SPA + its own NestJS API, split into
# two containers via web/Dockerfile.frontend + web/Dockerfile.backend + nginx).

framework: angular
projectName: frontend
outputDir: web/frontend/dist/frontend/browser
baseHref: "/{{IMAGE_NAME}}/"
port: 80
nginx: spa-fallback
dockerfile: web/Dockerfile.frontend
backend:
  name: web-backend
  buildDir: web/backend
  port: 3000
  dockerfile: web/Dockerfile.backend

# Additional standalone service scaffolded from the `backend` platform.
# Not consumed by the frontend build above — deploy as its own service.
extraServices:
  - name: backend
    buildDir: backend
    port: 3000
    dockerfile: backend/Dockerfile
